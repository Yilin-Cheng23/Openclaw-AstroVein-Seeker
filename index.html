<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter','PingFang SC',sans-serif;background:#f8f7ff;}

/* ── TAB BAR ── */
#tabbar{
  position:fixed;top:0;left:0;right:0;
  height:54px;z-index:9999;
  display:flex;align-items:center;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);
  border-bottom:2px solid #e0e7ff;
  box-shadow:0 2px 20px rgba(99,102,241,0.12);
  padding:0 20px;gap:4px;
}
#tabbar-logo{
  font-size:.95rem;font-weight:800;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;margin-right:4px;flex-shrink:0;
}
.tab-divider{width:1px;height:26px;background:#e0e7ff;margin:0 8px;flex-shrink:0;}
.tab{
  display:flex;align-items:center;gap:6px;
  padding:7px 15px;border:none;border-radius:10px;
  font-size:.85rem;font-weight:600;color:#6b7280;
  cursor:pointer;background:transparent;
  transition:all .18s ease;white-space:nowrap;
  font-family:'Inter','PingFang SC',sans-serif;
}
.tab:hover{background:rgba(99,102,241,.09);color:#6366f1;}
.tab.active{
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.38);
}
.tab-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:6px;
  font-size:.7rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  background:rgba(255,255,255,.28);
}
.tab:not(.active) .tab-num{background:rgba(99,102,241,.12);color:#6366f1;}

/* ── IFRAME ── */
#frame-wrap{
  position:fixed;top:54px;left:0;right:0;bottom:0;
}
#main-frame{
  width:100%;height:100%;border:none;display:block;
}
</style>

const tabsEl = document.getElementById('tabs');
const frame  = document.getElementById('main-frame');

// 建 tab 按钮
PAGES.forEach(function(p, i) {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i===0?' active':'');
  btn.innerHTML = '<span class="tab-num">'+p.num+'</span> '+p.title;
  btn.addEventListener('click', function() { switchTo(i); });
  tabsEl.appendChild(btn);
});

function switchTo(idx) {
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('active', i===idx);
  });
  frame.src = PAGES[idx].data;
  window.scrollTo({top:0});
}

// 初始加载第一页
switchTo(0);
</script>
